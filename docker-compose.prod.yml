# =============================================================================
# docker-compose.prod.yml — Production deployment for Chat Platform
# Uses external cloud databases (Supabase, MongoDB Atlas, Upstash, CloudAMQP)
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ─── Application Services ───────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: chat-auth-service
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  messaging-service:
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile
    container_name: chat-messaging-service
    restart: always
    env_file: .env.prod
    environment:
      ENCRYPTION_ENGINE_HOST: encryption-engine
      ENCRYPTION_ENGINE_PORT: "50051"
      NODE_ENV: production
    networks:
      - chat-network
    depends_on:
      - encryption-engine
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  encryption-engine:
    build:
      context: ./services/encryption-engine
      dockerfile: Dockerfile
    container_name: chat-encryption-engine
    restart: always
    env_file: .env.prod
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  file-service:
    build:
      context: ./services/file-service
      dockerfile: Dockerfile
    container_name: chat-file-service
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: chat-notification-service
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    networks:
      - chat-network
    depends_on:
      - messaging-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    restart: always
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    container_name: chat-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - chat-network
    depends_on:
      - auth-service
      - messaging-service
      - file-service
      - notification-service
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

networks:
  chat-network:
    driver: bridge
