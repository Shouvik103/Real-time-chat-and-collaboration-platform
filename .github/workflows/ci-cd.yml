# =============================================================================
# GitHub Actions CI/CD Pipeline — Lint, Test, Build & Push, Deploy
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/chat-platform

jobs:
  # ─── Job 1: Lint & Typecheck ─────────────────────────────────────────────

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, messaging-service, file-service, notification-service]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        if: matrix.service == 'auth-service' || matrix.service == 'notification-service' || matrix.service == 'file-service'
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ─── Job 1b: Frontend Lint & Typecheck ───────────────────────────────────

  lint-frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─── Job 2: Test ─────────────────────────────────────────────────────────

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    strategy:
      matrix:
        service: [auth-service, messaging-service]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (auth-service only)
        if: matrix.service == 'auth-service'
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          JWT_SECRET: test-ci-jwt-secret
          JWT_REFRESH_SECRET: test-ci-jwt-refresh-secret
          NODE_ENV: test
          BCRYPT_SALT_ROUNDS: "4"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 7

  # ─── Job 3: Build & Push Docker Images ───────────────────────────────────

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, lint-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
          - service: messaging-service
            context: services/messaging-service
          - service: file-service
            context: services/file-service
          - service: notification-service
            context: services/notification-service
          - service: encryption-engine
            context: services/encryption-engine
          - service: frontend
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy ──────────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # Run database migrations
            docker compose -f docker-compose.prod.yml run --rm auth-service npx prisma migrate deploy --schema=src/prisma/schema.prisma
            
            # Restart services with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f
